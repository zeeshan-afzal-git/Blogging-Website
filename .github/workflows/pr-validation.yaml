name: PR Validation

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      
      - name: Install dependencies
        run: npm install htmlhint stylelient stylelint-config-standard --save-dev

      - name: Run htmlhint
        run: npx htmlhint "src/**/*.html"

      - name: Run stylelint
        run: npx stylelint "src/**/*.css"

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      
      - name: Install dependencies
        run: npm install parcel
      
      - name: Build Project
        run: npx parcel uild "src/index.htmL"
      